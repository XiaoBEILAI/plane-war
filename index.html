<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache">
    <title>飞机大战</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 100%);
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        #gameBox {
            position: relative;
            border: 4px solid #0af;
            border-radius: 8px;
            box-shadow: 0 0 40px rgba(0, 170, 255, 0.4);
        }
        #gameCanvas {
            display: block;
            background: #000;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 16px;
            text-shadow: 2px 2px 4px #000;
            z-index: 10;
        }
        #ui div { margin: 8px 0; }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            z-index: 20;
        }
        .overlay h1 {
            font-size: 42px;
            color: #0af;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #0af;
        }
        .overlay p {
            font-size: 18px;
            color: #aaa;
            margin: 10px 0;
        }
        .overlay .score {
            font-size: 24px;
            color: #ff0;
        }
        .btn {
            margin-top: 30px;
            padding: 15px 50px;
            font-size: 20px;
            background: linear-gradient(180deg, #0af 0%, #068 100%);
            color: #fff;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0, 170, 255, 0.5);
            transition: all 0.2s;
        }
        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 30px rgba(0, 170, 255, 0.8);
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="gameBox">
        <canvas id="gameCanvas" width="480" height="700"></canvas>
        <div id="ui">
            <div>得分：<span id="scoreVal">0</span></div>
            <div>生命：<span id="livesVal">❤️❤️❤️</span></div>
            <div>等级：<span id="levelVal">1</span></div>
        </div>
        <div id="startScreen" class="overlay">
            <h1>🛩️ 飞机大战</h1>
            <p>鼠标移动控制飞机</p>
            <p>自动射击，消灭敌机！</p>
            <button class="btn" onclick="startGame()">开始游戏</button>
        </div>
        <div id="gameOverScreen" class="overlay hidden">
            <h1 style="color:#f44;">游戏结束</h1>
            <p class="score">得分：<span id="finalScore">0</span></p>
            <p>最高分：<span id="bestScore">0</span></p>
            <button class="btn" onclick="startGame()">再来一局</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreVal = document.getElementById('scoreVal');
        const livesVal = document.getElementById('livesVal');
        const levelVal = document.getElementById('levelVal');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreEl = document.getElementById('finalScore');
        const bestScoreEl = document.getElementById('bestScore');

        // 游戏配置
        const GAME = {
            width: canvas.width,
            height: canvas.height,
            fps: 60
        };

        // 游戏状态
        let state = {
            running: false,
            score: 0,
            lives: 3,
            level: 1,
            frames: 0
        };

        // 玩家对象
        let player = {
            x: GAME.width / 2,
            y: GAME.height - 100,
            w: 40,
            h: 50,
            speed: 0
        };

        // 游戏实体数组
        let bullets = [];
        let enemies = [];
        let particles = [];
        let stars = [];

        // 初始化星空背景
        function initStars() {
            stars = [];
            for (let i = 0; i < 80; i++) {
                stars.push({
                    x: Math.random() * GAME.width,
                    y: Math.random() * GAME.height,
                    s: Math.random() * 2 + 0.5,
                    spd: Math.random() * 3 + 2
                });
            }
        }

        // 更新星空
        function updateStars() {
            for (let star of stars) {
                ctx.fillStyle = `rgba(255,255,255,${Math.random() * 0.5 + 0.5})`;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.s, 0, Math.PI * 2);
                ctx.fill();
                star.y += star.spd;
                if (star.y > GAME.height) {
                    star.y = 0;
                    star.x = Math.random() * GAME.width;
                }
            }
        }

        // 绘制玩家飞机
        function drawPlayer() {
            const p = player;

            // 机身
            ctx.fillStyle = '#4af';
            ctx.beginPath();
            ctx.moveTo(p.x, p.y - p.h/2);
            ctx.lineTo(p.x - p.w/2, p.y + p.h/2);
            ctx.lineTo(p.x - p.w/4, p.y + p.h/2 - 8);
            ctx.lineTo(p.x + p.w/4, p.y + p.h/2 - 8);
            ctx.lineTo(p.x + p.w/2, p.y + p.h/2);
            ctx.closePath();
            ctx.fill();

            // 机翼
            ctx.fillStyle = '#28a';
            ctx.beginPath();
            ctx.moveTo(p.x - p.w/2, p.y);
            ctx.lineTo(p.x - p.w - 15, p.y + p.h/2);
            ctx.lineTo(p.x - p.w/2, p.y + p.h/2);
            ctx.closePath();
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(p.x + p.w/2, p.y);
            ctx.lineTo(p.x + p.w + 15, p.y + p.h/2);
            ctx.lineTo(p.x + p.w/2, p.y + p.h/2);
            ctx.closePath();
            ctx.fill();

            // 驾驶舱
            ctx.fillStyle = '#8ef';
            ctx.beginPath();
            ctx.arc(p.x, p.y - 5, 8, 0, Math.PI * 2);
            ctx.fill();

            // 引擎火焰
            ctx.fillStyle = `rgb(255, ${100 + Math.random() * 100}, 0)`;
            ctx.beginPath();
            ctx.moveTo(p.x - 8, p.y + p.h/2 - 3);
            ctx.lineTo(p.x, p.y + p.h/2 + 15 + Math.random() * 10);
            ctx.lineTo(p.x + 8, p.y + p.h/2 - 3);
            ctx.closePath();
            ctx.fill();
        }

        // 发射子弹
        function shoot() {
            bullets.push({ x: player.x, y: player.y - player.h/2, w: 5, h: 12, spd: 15 });

            if (state.level >= 3) {
                bullets.push({ x: player.x - 15, y: player.y, w: 4, h: 10, spd: 14, angle: -0.1 });
                bullets.push({ x: player.x + 15, y: player.y, w: 4, h: 10, spd: 14, angle: 0.1 });
            }
            if (state.level >= 5) {
                bullets.push({ x: player.x - 25, y: player.y + 10, w: 3, h: 8, spd: 12, angle: -0.2 });
                bullets.push({ x: player.x + 25, y: player.y + 10, w: 3, h: 8, spd: 12, angle: 0.2 });
            }
        }

        // 更新子弹
        function updateBullets() {
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.y -= b.spd;
                if (b.angle) b.x += Math.sin(b.angle) * 2;

                // 绘制
                ctx.fillStyle = '#0ff';
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#0ff';
                ctx.fillRect(b.x - b.w/2, b.y - b.h/2, b.w, b.h);
                ctx.shadowBlur = 0;

                if (b.y < -10) bullets.splice(i, 1);
            }
        }

        // 生成敌机
        function spawnEnemy() {
            const types = [
                { w: 35, h: 35, hp: 1, spd: 3, score: 10, color: '#f44' },
                { w: 45, h: 45, hp: 3, spd: 2, score: 30, color: '#f80' },
                { w: 55, h: 55, hp: 6, spd: 1.5, score: 60, color: '#a0f' }
            ];

            const maxType = Math.min(Math.floor((state.level - 1) / 2), types.length - 1);
            const t = types[Math.floor(Math.random() * (maxType + 1))];

            enemies.push({
                x: Math.random() * (GAME.width - 60) + 30,
                y: -50,
                w: t.w,
                h: t.h,
                hp: t.hp,
                maxHp: t.hp,
                spd: t.spd + state.level * 0.3,
                score: t.score,
                color: t.color
            });
        }

        // 更新敌机
        function updateEnemies() {
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                e.y += e.spd;

                // 绘制敌机
                ctx.fillStyle = e.color;
                ctx.beginPath();
                ctx.moveTo(e.x, e.y + e.h/2);
                ctx.lineTo(e.x - e.w/2, e.y - e.h/2);
                ctx.lineTo(e.x, e.y - e.h/2 + 10);
                ctx.lineTo(e.x + e.w/2, e.y - e.h/2);
                ctx.closePath();
                ctx.fill();

                // 引擎
                ctx.fillStyle = '#ff0';
                ctx.beginPath();
                ctx.arc(e.x, e.y - e.h/2 + 5, 4, 0, Math.PI * 2);
                ctx.fill();

                // 血条
                if (e.hp < e.maxHp) {
                    ctx.fillStyle = '#333';
                    ctx.fillRect(e.x - e.w/2, e.y - e.h/2 - 8, e.w, 4);
                    ctx.fillStyle = '#0f0';
                    ctx.fillRect(e.x - e.w/2, e.y - e.h/2 - 8, e.w * (e.hp / e.maxHp), 4);
                }

                if (e.y > GAME.height + 50) enemies.splice(i, 1);
            }
        }

        // 创建爆炸粒子
        function createExplosion(x, y, size, color) {
            const count = size;
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 1,
                    color: color,
                    size: Math.random() * 4 + 2
                });
            }
        }

        // 更新粒子
        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.2; // 重力
                p.life -= 0.03;

                if (p.life <= 0) {
                    particles.splice(i, 1);
                    continue;
                }

                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        // 碰撞检测
        function rectCollide(a, b) {
            return Math.abs(a.x - b.x) < (a.w + b.w) / 2 &&
                   Math.abs(a.y - b.y) < (a.h + b.h) / 2;
        }

        // 更新碰撞
        function updateCollisions() {
            // 子弹打敌机
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                const bRect = { x: b.x, y: b.y, w: b.w, h: b.h };

                for (let j = enemies.length - 1; j >= 0; j--) {
                    const e = enemies[j];

                    if (rectCollide(bRect, e)) {
                        bullets.splice(i, 1);
                        e.hp--;

                        if (e.hp <= 0) {
                            createExplosion(e.x, e.y, 15, e.color);
                            state.score += e.score;
                            scoreVal.textContent = state.score;

                            // 升级
                            if (state.score >= state.level * 200) {
                                state.level++;
                                levelVal.textContent = state.level;
                            }

                            enemies.splice(j, 1);
                        }
                        break;
                    }
                }
            }

            // 敌机撞玩家
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                const pRect = { x: player.x, y: player.y, w: player.w * 0.8, h: player.h * 0.8 };

                if (rectCollide(pRect, e)) {
                    createExplosion(player.x, player.y, 25, '#f44');
                    enemies.splice(i, 1);
                    state.lives--;
                    livesVal.textContent = '❤️'.repeat(Math.max(0, state.lives));

                    if (state.lives <= 0) {
                        gameOver();
                    }
                    break;
                }
            }
        }

        // 开始游戏
        function startGame() {
            state = { running: true, score: 0, lives: 3, level: 1, frames: 0 };
            player = { x: GAME.width/2, y: GAME.height-100, w: 40, h: 50, speed: 0 };
            bullets = [];
            enemies = [];
            particles = [];

            scoreVal.textContent = '0';
            livesVal.textContent = '❤️❤️❤️';
            levelVal.textContent = '1';

            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');

            initStars();
        }

        // 游戏结束
        function gameOver() {
            state.running = false;

            const best = localStorage.getItem('planeBest') || 0;
            if (state.score > best) {
                localStorage.setItem('planeBest', state.score);
            }

            finalScoreEl.textContent = state.score;
            bestScoreEl.textContent = Math.max(best, state.score);
            gameOverScreen.classList.remove('hidden');
        }

        // 鼠标控制
        canvas.addEventListener('mousemove', (e) => {
            if (!state.running) return;
            const rect = canvas.getBoundingClientRect();
            player.x = e.clientX - rect.left;
            player.y = e.clientY - rect.top;

            // 边界限制
            player.x = Math.max(player.w/2 + 20, Math.min(GAME.width - player.w/2 - 20, player.x));
            player.y = Math.max(player.h/2, Math.min(GAME.height - player.h/2, player.y));
        });

        // 游戏主循环
        let shootTimer = 0;
        let spawnTimer = 0;

        function gameLoop() {
            // 清空画布
            ctx.fillStyle = '#000810';
            ctx.fillRect(0, 0, GAME.width, GAME.height);

            // 更新星空
            updateStars();

            if (state.running) {
                state.frames++;

                // 玩家
                drawPlayer();

                // 射击 (每 15 帧)
                shootTimer++;
                const shootSpeed = Math.max(8, 15 - Math.floor(state.level / 2));
                if (shootTimer >= shootSpeed) {
                    shoot();
                    shootTimer = 0;
                }

                // 生成敌机
                spawnTimer++;
                const spawnRate = Math.max(20, 60 - state.level * 5);
                if (spawnTimer >= spawnRate) {
                    spawnEnemy();
                    spawnTimer = 0;
                }

                // 更新实体
                updateBullets();
                updateEnemies();
                updateParticles();
                updateCollisions();
            }

            requestAnimationFrame(gameLoop);
        }

        // 初始化
        localStorage.setItem('planeBest', localStorage.getItem('planeBest') || 0);
        initStars();
        gameLoop();
    </script>
</body>
</html>
